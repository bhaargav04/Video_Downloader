<!DOCTYPE html>
<html>
<head>
  <title>Video Downloader</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      margin-top: 80px;
    }

    input {
      padding: 12px;
      width: 350px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 12px 16px;
      margin-left: 10px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    img {
      margin-top: 20px;
      width: 300px;
      border-radius: 10px;
    }

    .formats button {
      margin: 5px;
      background: #3b82f6;
    }

    #progress {
      width: 300px;
      height: 10px;
      background: #333;
      margin: 20px auto;
      border-radius: 5px;
      overflow: hidden;
    }

    #bar {
      height: 100%;
      width: 0%;
      background: #22c55e;
    }
  </style>
</head>

<body>

<h2>🚀 Video Downloader</h2>

<input id="url" placeholder="Paste video URL">
<button onclick="analyze()">Analyze</button>

<div id="preview"></div>
<div class="formats" id="formats"></div>

<div id="progress"><div id="bar"></div></div>

<p id="status"></p>

<script>
let currentUrl = "";

async function analyze() {
  const url = document.getElementById("url").value;
  currentUrl = url;

  const res = await fetch("/analyze", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ url })
  });

  const data = await res.json();

  document.getElementById("preview").innerHTML = `
    <h3>${data.title}</h3>
    <img src="${data.thumbnail}" />
  `;

  const formatsDiv = document.getElementById("formats");
  formatsDiv.innerHTML = "";

  data.formats.forEach(f => {
    const btn = document.createElement("button");
    btn.innerText = f.quality;
    btn.onclick = () => download(f.format_id);
    formatsDiv.appendChild(btn);
  });
}

async function download(format_id) {
  const url = document.getElementById("url").value;

  const form = document.createElement("form");
  form.method = "POST";
  form.action = "/download";

  const input1 = document.createElement("input");
  input1.type = "hidden";
  input1.name = "url";
  input1.value = url;

  const input2 = document.createElement("input");
  input2.type = "hidden";
  input2.name = "format_id";
  input2.value = format_id;

  form.appendChild(input1);
  form.appendChild(input2);

  document.body.appendChild(form);
  form.submit();
}
</script>

</body>
</html>
